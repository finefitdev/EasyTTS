# .github/workflows/build.yml
name: Build Windows EXE
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true                # drop if your voices aren't in Git LFS

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install piper-tts gtts pygame-ce pyttsx3 numpy pyinstaller

      - name: Locate piper's espeak-ng-data
        shell: pwsh
        run: |
          $e = python -c "import piper,pathlib;print(pathlib.Path(piper.__file__).parent/'espeak-ng-data')"
          echo "ESPEAK_DIR=$e" >> $env:GITHUB_ENV

      - name: Build
        run: >
          pyinstaller --onefile --windowed --name SimpleTTS
          --collect-all piper
          --collect-all onnxruntime
          --collect-data gtts
          --add-data "${{ env.ESPEAK_DIR }};espeak-ng-data"
          main.py

      - name: Stage release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release\SpeakMyChat | Out-Null
          Copy-Item dist\SimpleTTS.exe release\SpeakMyChat\
          if (Test-Path voices) { Copy-Item voices release\SpeakMyChat\voices -Recurse }
          if (Test-Path sounds) { Copy-Item sounds release\SpeakMyChat\sounds -Recurse }
          Compress-Archive -Path release\SpeakMyChat -DestinationPath SpeakMyChat-windows.zip -Force

      - name: Provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/SimpleTTS.exe

      - uses: actions/upload-artifact@v4
        with:
          name: SpeakMyChat-windows
          path: SpeakMyChat-windows.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SpeakMyChat-windows.zip
